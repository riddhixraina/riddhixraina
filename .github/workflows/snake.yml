name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snake@v3
        with:
          github_user_name: riddhixraina
          outputs: dist/github-contribution-grid-snake.svg

      - name: Deploy snake to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          single-commit: true
          commit-message: "chore: update contribution snake"
